services:

  flask-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - enterprise-network

  mysql:
    image: mysql:8.4
    container_name: enterprise-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enterprise_cicd
      MYSQL_USER: enterprise_user
      MYSQL_PASSWORD: enterprise_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enterprise-network

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - enterprise-network

  nginx:
    build:
      context: ./nginx
    container_name: enterprise-nginx
    depends_on:
      - flask-api
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - enterprise-network

  jenkins:
    build:
      context: ./jenkins
    container_name: enterprise-jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - enterprise-network

  prometheus:
    image: prom/prometheus:latest
    container_name: enterprise-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - flask-api
    networks:
      - enterprise-network

  grafana:
    image: grafana/grafana:latest
    container_name: enterprise-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - enterprise-network 

  loki:
    image: grafana/loki:2.9.8
    container_name: enterprise-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - enterprise-network

  promtail:
    image: grafana/promtail:2.9.8
    container_name: enterprise-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - enterprise-network

networks:
  enterprise-network:
    driver: bridge

volumes:
  mysql_data:
  jenkins_home:
  prometheus_data:
  grafana_data:
  loki_data: