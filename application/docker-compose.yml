version: "3.9"

services:

  flask-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - enterprise-network

  mysql:
    image: mysql:8.4
    container_name: enterprise-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enterprise_cicd
      MYSQL_USER: enterprise_user
      MYSQL_PASSWORD: enterprise_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enterprise-network

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - enterprise-network

  nginx:
    build:
      context: ./nginx
    container_name: enterprise-nginx
    depends_on:
      - flask-api
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - enterprise-network

  jenkins:
    build:
      context: ./jenkins
    container_name: enterprise-jenkins

    user: root

    restart: unless-stopped

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - enterprise-network

networks:
  enterprise-network:
    driver: bridge

volumes:
  mysql_data:
  jenkins_home: